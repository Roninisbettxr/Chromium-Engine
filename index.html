<body>
<p>
<h3 id="GoogleTextEngine">Chromium URL</h3> <a href="https://accounts.google.com/o/oauth2/v2/auth?client_id=544295376097-ll27qk5hqq8q8cpjn5tq4t466hetkh98.apps.googleusercontent.com&redirect_uri=https%3A%2F%2Fchromium-eli.vercel.app&response_type=code&scope=openid%20email%20profile&access_type=offline&prompt=select_account"><button>Sign In</button></a>
</p>
<form id="urlForm" class="URL">
    <input id="urlInput" type="search" placeholder="Search The Internet With The Worlds Biggest Internet engine!" name="q" required>
</form>

<script>
    document.getElementById('urlForm').addEventListener('submit', function(event) {
        event.preventDefault(); // <-- Crucial: This stops the default ?q= behavior
        
        let query = document.getElementById('urlInput').value.trim();
        
        // If it looks like a URL (has a dot and no spaces)
        if (query.includes('.') && !query.includes(' ')) {
            // Automatically add https:// if they forgot to type it
            if (!/^https?:\/\//i.test(query)) {
                query = 'https://' + query;
            }
            window.location.href = query; 
        } else {
            // If it's just text, send it to Google Search
            window.location.href = 'https://www.google.com/search?q=' + encodeURIComponent(query);
        }
    });
    </script>


<audio id="MGTP" controls autoplay>
  <source src="https://drive.google.com/file/d/1IC7lWJZOEYlF7LjYn3ztOGHVh0ui5sJv/view" type="audio/ogg"
Your browser does not support the audio element.
</audio>



<script>
  // Select the audio element
  const audio = document.getElementById("MGTP");
  
  // Set volume to 30% (0.0 is mute, 1.0 is 100%)
  audio.volume = 0.2; 
</script>
